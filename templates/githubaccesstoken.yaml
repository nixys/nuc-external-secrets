{{- range $name := keys ($.Values.githubAccessTokens | default dict) | sortAlpha }}
{{- $item := get $.Values.githubAccessTokens $name -}}
{{- if and (ne $name "__helm_docs_example__") (include "nuc-external-secrets.isActiveItem" $item) }}
---
{{ include "nuc-external-secrets.renderNamespacedResource" (dict "root" $ "name" $name "item" $item "kind" "GithubAccessToken" "apiVersionKey" "githubAccessToken") }}
{{- end }}
{{- end }}
