# -- Enable nuc-external-secrets chart rendering.
enabled: true

# -- Compatibility values inherited from umbrella charts. Accepted but ignored by this chart.
global: {}

# -- Override the default chart label name if needed.
nameOverride: ""

# -- Optional release prefix used for generated names.
releasePrefix: ""

# -- Extra labels applied to every rendered resource.
commonLabels: {}
# -- Extra annotations applied to every rendered resource.
commonAnnotations: {}

# The defaults below are aligned with the External Secrets Operator CRD bundle.
# Override any entry if your cluster serves a different group/version combination.
apiVersions:
  # -- Default apiVersion for ExternalSecret resources.
  externalSecret: external-secrets.io/v1
  # -- Default apiVersion for ClusterExternalSecret resources.
  clusterExternalSecret: external-secrets.io/v1
  # -- Default apiVersion for SecretStore resources.
  secretStore: external-secrets.io/v1
  # -- Default apiVersion for ClusterSecretStore resources.
  clusterSecretStore: external-secrets.io/v1
  # -- Default apiVersion for PushSecret resources.
  pushSecret: external-secrets.io/v1alpha1
  # -- Default apiVersion for ClusterPushSecret resources.
  clusterPushSecret: external-secrets.io/v1alpha1

# Cross-item spec defaults, merged into spec of every resource of the matching kind.
# Per-item spec fields always win over generic defaults (mustMergeOverwrite, item on top).
# Keep in mind that arrays (data, dataFrom, ...) are replaced wholesale by the item, not merged.
generic:
  # -- Default spec fragment merged into every ExternalSecret.
  externalSecret: {}
  # -- Default spec fragment merged into every ClusterExternalSecret.
  clusterExternalSecret: {}
  # -- Default spec fragment merged into every SecretStore.
  secretStore: {}
  # -- Default spec fragment merged into every ClusterSecretStore.
  clusterSecretStore: {}
  # -- Default spec fragment merged into every PushSecret.
  pushSecret: {}
  # -- Default spec fragment merged into every ClusterPushSecret.
  clusterPushSecret: {}

# Each resource map entry supports:
# - the map key: required resource name (becomes metadata.name, optionally with releasePrefix)
# - namespace: optional for namespaced resources, defaults to the release namespace
# - labels: optional, merged over commonLabels and chart labels
# - annotations: optional, merged over commonAnnotations
# - apiVersion: optional override for a single resource
# - spec: arbitrary resource spec; merged on top of generic.<kind>
# - status: optional raw status block for fixtures and synthetic manifests
# - enabled: if false, the entry is skipped
# - set an entry to null in a higher-precedence values file to suppress a lower-precedence default resource

# -- ExternalSecret resources keyed by resource name.
# @default -- {}
externalSecrets:
  __helm_docs_example__:
    # -- Namespace for the ExternalSecret. Defaults to the Helm release namespace.
    # @default -- release namespace
    namespace: documentation-placeholder
    # -- Resource-specific labels.
    labels: {}
    # -- Resource-specific annotations.
    annotations: {}
    # -- Per-resource apiVersion override.
    # @default -- apiVersions.externalSecret
    apiVersion: external-secrets.io/v1
    # -- Resource spec rendered as-is, merged on top of generic.externalSecret.
    spec: {}
    # -- Optional resource status rendered as-is.
    status: {}

# -- ClusterExternalSecret resources keyed by resource name.
# @default -- {}
clusterExternalSecrets:
  __helm_docs_example__:
    # -- Cluster-scoped: namespace is ignored.
    labels: {}
    annotations: {}
    apiVersion: external-secrets.io/v1
    spec: {}
    status: {}

# -- SecretStore resources keyed by resource name.
# @default -- {}
secretStores:
  __helm_docs_example__:
    namespace: documentation-placeholder
    labels: {}
    annotations: {}
    apiVersion: external-secrets.io/v1
    spec: {}
    status: {}

# -- ClusterSecretStore resources keyed by resource name.
# @default -- {}
clusterSecretStores:
  __helm_docs_example__:
    labels: {}
    annotations: {}
    apiVersion: external-secrets.io/v1
    spec: {}
    status: {}

# -- PushSecret resources keyed by resource name.
# @default -- {}
pushSecrets:
  __helm_docs_example__:
    namespace: documentation-placeholder
    labels: {}
    annotations: {}
    apiVersion: external-secrets.io/v1alpha1
    spec: {}
    status: {}

# -- ClusterPushSecret resources keyed by resource name.
# @default -- {}
clusterPushSecrets:
  __helm_docs_example__:
    labels: {}
    annotations: {}
    apiVersion: external-secrets.io/v1alpha1
    spec: {}
    status: {}
