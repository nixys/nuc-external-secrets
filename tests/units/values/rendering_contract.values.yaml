commonLabels:
  env: prod
  owner: platform
commonAnnotations:
  sync-wave: "-1"

generic:
  externalSecret:
    refreshInterval: 1h
    secretStoreRef:
      name: vault
      kind: ClusterSecretStore
    target:
      creationPolicy: Owner
  pushSecret:
    deletionPolicy: Delete
    refreshInterval: 1h
    secretStoreRefs:
      - name: vault
        kind: ClusterSecretStore

externalSecrets:
  app-one:
    spec:
      data:
        - secretKey: DB_PASS
          remoteRef:
            key: kv/prod/app-one
            property: password
  app-two:
    namespace: apps
    labels:
      tier: backend
    annotations:
      rotated-by: eso
    spec:
      refreshInterval: 30m
      dataFrom:
        - extract:
            key: kv/prod/app-two

clusterExternalSecrets:
  broadcast:
    spec:
      externalSecretName: broadcast
      namespaceSelectors:
        - matchLabels:
            pull-secrets: "true"
      externalSecretSpec:
        secretStoreRef:
          name: vault
          kind: ClusterSecretStore
        target:
          name: broadcast
        data:
          - secretKey: payload
            remoteRef:
              key: kv/global/broadcast
              property: payload

secretStores:
  team-a:
    spec:
      provider:
        vault:
          server: https://vault.example.com
          path: secret
          version: v2
          auth:
            kubernetes:
              mountPath: kubernetes
              role: team-a

clusterSecretStores:
  vault:
    spec:
      provider:
        vault:
          server: https://vault.example.com
          path: secret
          version: v2
          auth:
            kubernetes:
              mountPath: kubernetes
              role: eso-default

pushSecrets:
  sync-creds:
    spec:
      selector:
        secret:
          name: local-creds
      data:
        - match:
            secretKey: password
            remoteRef:
              remoteKey: kv/pushed/creds

clusterPushSecrets:
  broadcast-ca:
    spec:
      selector:
        secret:
          name: ca-cert
      data:
        - match:
            secretKey: ca.crt
            remoteRef:
              remoteKey: kv/shared/ca
