suite: example resources
release:
  name: unit-test
  namespace: unit-namespace
templates:
  - templates/externalsecret.yaml
  - templates/clusterexternalsecret.yaml
  - templates/secretstore.yaml
  - templates/clustersecretstore.yaml
  - templates/pushsecret.yaml
  - templates/clusterpushsecret.yaml

tests:
  - it: renders one document for each namespaced example resource
    values:
      - ../../values.yaml.example
    template: templates/externalsecret.yaml
    asserts:
      - hasDocuments:
          count: 1

  - it: renders one document for each cluster-scoped example resource
    values:
      - ../../values.yaml.example
    template: templates/clustersecretstore.yaml
    asserts:
      - hasDocuments:
          count: 1

  - it: renders the example ExternalSecret with prefixed names
    values:
      - ../../values.yaml.example
    template: templates/externalsecret.yaml
    documentSelector:
      path: metadata.name
      value: external-secrets-app-config
    asserts:
      - isKind:
          of: ExternalSecret
      - equal:
          path: metadata.namespace
          value: app
      - equal:
          path: spec.secretStoreRef.name
          value: external-secrets-tenant-store
      - equal:
          path: spec.target.template.metadata.labels["synced-by"]
          value: eso

  - it: renders the example ClusterExternalSecret with prefixed names
    values:
      - ../../values.yaml.example
    template: templates/clusterexternalsecret.yaml
    documentSelector:
      path: metadata.name
      value: external-secrets-shared-app-secrets
    asserts:
      - isKind:
          of: ClusterExternalSecret
      - notExists:
          path: metadata.namespace
      - equal:
          path: spec.externalSecretSpec.secretStoreRef.name
          value: external-secrets-tenant-store

  - it: renders a cluster-scoped resource without metadata.namespace
    values:
      - ../../values.yaml.example
    template: templates/clustersecretstore.yaml
    documentSelector:
      path: metadata.name
      value: external-secrets-tenant-store
    asserts:
      - isKind:
          of: ClusterSecretStore
      - notExists:
          path: metadata.namespace
      - equal:
          path: spec.provider.webhook.result.jsonPath
          value: $.data

  - it: renders PushSecret with inherited generic defaults
    values:
      - ../../values.yaml.example
    template: templates/pushsecret.yaml
    documentSelector:
      path: metadata.name
      value: external-secrets-app-push
    asserts:
      - isKind:
          of: PushSecret
      - equal:
          path: metadata.namespace
          value: app
      - equal:
          path: spec.deletionPolicy
          value: Delete
      - equal:
          path: spec.secretStoreRefs[0].name
          value: external-secrets-tenant-store

  - it: renders ClusterPushSecret from the example values
    values:
      - ../../values.yaml.example
    template: templates/clusterpushsecret.yaml
    documentSelector:
      path: metadata.name
      value: external-secrets-shared-push-secret
    asserts:
      - isKind:
          of: ClusterPushSecret
      - notExists:
          path: metadata.namespace
      - equal:
          path: spec.pushSecretSpec.secretStoreRefs[0].name
          value: external-secrets-tenant-store
