  # --- VaultDynamicSecret ---

  - it: VaultDynamicSecret renders correct kind apiVersion and namespace
    template: templates/vaultdynamicsecret.yaml
    values:
      - values/generators.values.yaml
    documentSelector:
      path: metadata.name
