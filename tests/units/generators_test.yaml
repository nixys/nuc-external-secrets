    asserts:
      - equal:
          path: apiVersion
          value: generators.external-secrets.io/v1alpha1
      - isKind:
          of: STSSessionToken
      - equal:
          path: metadata.namespace
          value: apps
      - equal:
          path: spec.region
          value: us-east-1

  # --- UUID ---

  - it: UUID renders correct kind apiVersion and namespace
    template: templates/uuid.yaml
    values:
      - values/generators.values.yaml
    documentSelector:
      path: metadata.name
      value: test-my-uuid
    asserts:
      - equal:
          path: apiVersion
          value: generators.external-secrets.io/v1alpha1
      - isKind:
          of: UUID
      - equal:
