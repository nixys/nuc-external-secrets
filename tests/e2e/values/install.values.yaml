releasePrefix: e2e

commonLabels:
  test-suite: e2e

commonAnnotations:
  test-suite: e2e

secretStores:
  store:
    spec:
      provider:
        fake:
          data:
            - key: username
              value: e2e-user
            - key: password
              value: e2e-password

externalSecrets:
  app-config:
    spec:
      refreshInterval: 1h
      secretStoreRef:
        name: e2e-store
        kind: SecretStore
      target:
        name: e2e-app-config
        creationPolicy: Owner
      data:
        - secretKey: username
          remoteRef:
            key: username
        - secretKey: password
          remoteRef:
            key: password

fakes:
  static-data:
    spec:
      data:
        - key: color
          value: blue
        - key: size
          value: large

passwords:
  app-password:
    spec:
      length: 32
      digits: 8
      symbols: 4
      symbolCharacters: "-_$@"
      noUpper: false

uuids:
  request-id:
    spec: {}

clusterGenerators:
  shared-password:
    spec:
      kind: Password
      generator:
        apiVersion: generators.external-secrets.io/v1alpha1
        kind: Password
        spec:
          length: 24
          digits: 4
          symbols: 2
          noUpper: false
