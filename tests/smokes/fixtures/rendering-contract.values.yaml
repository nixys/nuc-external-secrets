commonLabels:
  env: prod
commonAnnotations:
  test/generator: smoke

generic:
  externalSecret:
    refreshInterval: 1h
    secretStoreRef:
      name: vault
      kind: ClusterSecretStore
    target:
      creationPolicy: Owner
  pushSecret:
    deletionPolicy: Delete
    refreshInterval: 1h
    secretStoreRefs:
      - name: vault
        kind: ClusterSecretStore

externalSecrets:
  simple-app:
    spec:
      data:
        - secretKey: DB_PASS
          remoteRef:
            key: kv/prod/simple-app
            property: password

  dataFrom-app:
    spec:
      refreshInterval: 30m
      dataFrom:
        - extract:
            key: kv/prod/dataFrom-app

clusterExternalSecrets:
  broadcast:
    spec:
      externalSecretName: broadcast
      namespaceSelectors:
        - matchLabels:
            pull-secrets: "true"
      externalSecretSpec:
        secretStoreRef:
          name: vault
          kind: ClusterSecretStore
        target:
          name: broadcast
        data:
          - secretKey: payload
            remoteRef:
              key: kv/global/broadcast
              property: payload

secretStores:
  team-a:
    spec:
      provider:
        vault:
          server: https://vault.example.com
          path: secret
          version: v2
          auth:
            kubernetes:
              mountPath: kubernetes
              role: team-a

clusterSecretStores:
  vault:
    spec:
      provider:
        vault:
          server: https://vault.example.com
          path: secret
          version: v2
          auth:
            kubernetes:
              mountPath: kubernetes
              role: eso-default

pushSecrets:
  sync-creds:
    spec:
      selector:
        secret:
          name: local-creds
      data:
        - match:
            secretKey: password
            remoteRef:
              remoteKey: kv/pushed/creds

clusterPushSecrets:
  broadcast-ca:
    spec:
      pushSecretSpec:
        secretStoreRefs:
          - name: vault
            kind: ClusterSecretStore
        selector:
          secret:
            name: ca-cert
        data:
          - match:
              secretKey: ca.crt
              remoteRef:
                remoteKey: kv/shared/ca
